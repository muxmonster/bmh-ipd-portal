<div class="min-h-screen bg-slate-100 py-10 px-6">
  <div class="flex items-center justify-center mb-10">
    <h1 class="text-2xl font-bold text-slate-700">
      รายงานการใช้ระบบงานเสริม(ผู้ป่วยใน) รพ.บ้านหมี่
    </h1>
  </div>
  <div
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6 max-w-4xl mx-auto"
  >
    @for (item of apps(); track item.title) { @if(!item.disable){
    <a
      [attr.href]="item.url + '/'"
      class="p-4 bg-white shadow hover:shadow-lg hover:shadow-slate-500/60 border border-slate-300 rounded-lg transition cursor-pointer group items-center justify-center flex flex-col"
    >
      <lucide-angular [img]="ClipboardPlus" class="my-icon" strokeWidth="1" color="green" size="48" />

      <div class="text-lg text-slate-800 font-semibold">
        {{ item.title }}
      </div>
      <div class="font-semibold text-center text-sky-600 mt-2 group-hover:underline">
        เข้าใช้งาน →
      </div>
    </a>
    } }
  </div>
</div>
